aid: national-science-foundation
name: National Science Foundation
description: >-
  The National Science Foundation (NSF) is an independent federal agency that
  supports fundamental research and education in all the non-medical fields of
  science and engineering. NSF provides grants and funding to researchers
  and institutions to drive innovation, discovery, and progress.
