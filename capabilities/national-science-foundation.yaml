naftiko: 1.0.0-alpha2
info:
  label: National Science Foundation Awards API
  description: 'National Science Foundation Awards API. 3 operations. Lead operation: Search awards. Self-contained Naftiko
    capability covering one National Science Foundation business surface.'
  tags:
  - National Science Foundation
  - National Science Foundation Awards API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NATIONAL_SCIENCE_FOUNDATION_API_KEY: NATIONAL_SCIENCE_FOUNDATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: national-science-foundation
    baseUri: https://api.nsf.gov/services/v1
    description: National Science Foundation Awards API business capability. Self-contained, no shared references.
    resources:
    - name: awards.{format}
      path: /awards.{format}
      operations:
      - name: get
        method: GET
        description: Search awards
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: format
          in: path
          type: string
          required: true
        - name: keyword
          in: query
          type: string
          description: Free-text search supporting Boolean AND, OR, NOT.
        - name: rpp
          in: query
          type: integer
          description: Results per page.
        - name: offset
          in: query
          type: integer
          description: Starting record offset for pagination.
        - name: sortKey
          in: query
          type: string
        - name: sortDirection
          in: query
          type: string
        - name: dateStart
          in: query
          type: string
          description: Award date start (mm/dd/yyyy).
        - name: dateEnd
          in: query
          type: string
        - name: startDateStart
          in: query
          type: string
        - name: startDateEnd
          in: query
          type: string
        - name: expDateStart
          in: query
          type: string
        - name: expDateEnd
          in: query
          type: string
        - name: estimatedTotalAmtFrom
          in: query
          type: number
        - name: estimatedTotalAmtTo
          in: query
          type: number
        - name: fundsObligatedAmtFrom
          in: query
          type: number
        - name: fundsObligatedAmtTo
          in: query
          type: number
        - name: awardeeName
          in: query
          type: string
        - name: awardeeCity
          in: query
          type: string
        - name: awardeeStateCode
          in: query
          type: string
        - name: awardeeZipCode
          in: query
          type: string
        - name: perfCity
          in: query
          type: string
        - name: perfStateCode
          in: query
          type: string
        - name: perfLocation
          in: query
          type: string
        - name: pdPIName
          in: query
          type: string
        - name: coPDPI
          in: query
          type: string
        - name: poName
          in: query
          type: string
        - name: org_code_dir
          in: query
          type: string
        - name: org_code_div
          in: query
          type: string
        - name: progEleCode
          in: query
          type: string
        - name: ActiveAwards
          in: query
          type: boolean
        - name: ExpiredAwards
          in: query
          type: boolean
        - name: histAwd
          in: query
          type: boolean
        - name: transType
          in: query
          type: string
        - name: callback
          in: query
          type: string
          description: JSONP callback name (when format is json).
    - name: awards-id}.{format
      path: /awards/{id}.{format}
      operations:
      - name: get
        method: GET
        description: Retrieve a single award
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: NSF award number.
          required: true
        - name: format
          in: path
          type: string
          required: true
    - name: awards-id-projectoutcomes.{format}
      path: /awards/{id}/projectoutcomes.{format}
      operations:
      - name: get
        method: GET
        description: Retrieve project outcomes for an award
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: format
          in: path
          type: string
          required: true
  exposes:
  - type: rest
    namespace: national-science-foundation-rest
    port: 8080
    description: REST adapter for National Science Foundation Awards API. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/awards-format
      name: awards-format
      description: REST surface for awards.{format}.
      operations:
      - method: GET
        name: get
        description: Search awards
        call: national-science-foundation.get
        with:
          format: rest.format
          keyword: rest.keyword
          rpp: rest.rpp
          offset: rest.offset
          sortKey: rest.sortKey
          sortDirection: rest.sortDirection
          dateStart: rest.dateStart
          dateEnd: rest.dateEnd
          startDateStart: rest.startDateStart
          startDateEnd: rest.startDateEnd
          expDateStart: rest.expDateStart
          expDateEnd: rest.expDateEnd
          estimatedTotalAmtFrom: rest.estimatedTotalAmtFrom
          estimatedTotalAmtTo: rest.estimatedTotalAmtTo
          fundsObligatedAmtFrom: rest.fundsObligatedAmtFrom
          fundsObligatedAmtTo: rest.fundsObligatedAmtTo
          awardeeName: rest.awardeeName
          awardeeCity: rest.awardeeCity
          awardeeStateCode: rest.awardeeStateCode
          awardeeZipCode: rest.awardeeZipCode
          perfCity: rest.perfCity
          perfStateCode: rest.perfStateCode
          perfLocation: rest.perfLocation
          pdPIName: rest.pdPIName
          coPDPI: rest.coPDPI
          poName: rest.poName
          org_code_dir: rest.org_code_dir
          org_code_div: rest.org_code_div
          progEleCode: rest.progEleCode
          ActiveAwards: rest.ActiveAwards
          ExpiredAwards: rest.ExpiredAwards
          histAwd: rest.histAwd
          transType: rest.transType
          callback: rest.callback
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/awards/{id-format}
      name: awards-id-format
      description: REST surface for awards-id}.{format.
      operations:
      - method: GET
        name: get
        description: Retrieve a single award
        call: national-science-foundation.get
        with:
          id: rest.id
          format: rest.format
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/awards/{id}/projectoutcomes-format
      name: awards-id-projectoutcomes-format
      description: REST surface for awards-id-projectoutcomes.{format}.
      operations:
      - method: GET
        name: get
        description: Retrieve project outcomes for an award
        call: national-science-foundation.get
        with:
          id: rest.id
          format: rest.format
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: national-science-foundation-mcp
    port: 9090
    transport: http
    description: MCP adapter for National Science Foundation Awards API. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: search-awards
      description: Search awards
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: national-science-foundation.get
      with:
        format: tools.format
        keyword: tools.keyword
        rpp: tools.rpp
        offset: tools.offset
        sortKey: tools.sortKey
        sortDirection: tools.sortDirection
        dateStart: tools.dateStart
        dateEnd: tools.dateEnd
        startDateStart: tools.startDateStart
        startDateEnd: tools.startDateEnd
        expDateStart: tools.expDateStart
        expDateEnd: tools.expDateEnd
        estimatedTotalAmtFrom: tools.estimatedTotalAmtFrom
        estimatedTotalAmtTo: tools.estimatedTotalAmtTo
        fundsObligatedAmtFrom: tools.fundsObligatedAmtFrom
        fundsObligatedAmtTo: tools.fundsObligatedAmtTo
        awardeeName: tools.awardeeName
        awardeeCity: tools.awardeeCity
        awardeeStateCode: tools.awardeeStateCode
        awardeeZipCode: tools.awardeeZipCode
        perfCity: tools.perfCity
        perfStateCode: tools.perfStateCode
        perfLocation: tools.perfLocation
        pdPIName: tools.pdPIName
        coPDPI: tools.coPDPI
        poName: tools.poName
        org_code_dir: tools.org_code_dir
        org_code_div: tools.org_code_div
        progEleCode: tools.progEleCode
        ActiveAwards: tools.ActiveAwards
        ExpiredAwards: tools.ExpiredAwards
        histAwd: tools.histAwd
        transType: tools.transType
        callback: tools.callback
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-single-award
      description: Retrieve a single award
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: national-science-foundation.get
      with:
        id: tools.id
        format: tools.format
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-project-outcomes-award
      description: Retrieve project outcomes for an award
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: national-science-foundation.get
      with:
        id: tools.id
        format: tools.format
      outputParameters:
      - type: object
        mapping: $.
