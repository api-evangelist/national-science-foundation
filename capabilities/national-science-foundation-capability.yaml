      - name: dateEnd
        type: string
        description: dateEnd
      - name: startDateStart
        type: string
        description: startDateStart
      - name: startDateEnd
        type: string
        description: startDateEnd
      - name: expDateStart
        type: string
        description: expDateStart
      - name: expDateEnd
        type: string
        description: expDateEnd
      - name: estimatedTotalAmtFrom
        type: number
        description: estimatedTotalAmtFrom
      - name: estimatedTotalAmtTo
        type: number
        description: estimatedTotalAmtTo
      - name: fundsObligatedAmtFrom
        type: number
        description: fundsObligatedAmtFrom
      - name: fundsObligatedAmtTo
        type: number
        description: fundsObligatedAmtTo
      - name: awardeeName
        type: string
        description: awardeeName
      - name: awardeeCity
        type: string
        description: awardeeCity
      - name: awardeeStateCode
        type: string
        description: awardeeStateCode
      - name: awardeeZipCode
        type: string
        description: awardeeZipCode
      - name: perfCity
        type: string
        description: perfCity
      - name: perfStateCode
        type: string
        description: perfStateCode
      - name: perfLocation
        type: string
        description: perfLocation
      - name: pdPIName
        type: string
        description: pdPIName
      - name: coPDPI
        type: string
        description: coPDPI
      - name: poName
        type: string
        description: poName
      - name: org_code_dir
        type: string
        description: org_code_dir
      - name: org_code_div
        type: string
        description: org_code_div
      - name: progEleCode
        type: string
        description: progEleCode
      - name: ActiveAwards
        type: boolean
        description: ActiveAwards
      - name: ExpiredAwards
        type: boolean
        description: ExpiredAwards
      - name: histAwd
        type: boolean
        description: histAwd
      - name: transType
        type: string
        description: transType
      - name: callback
        type: string
        description: JSONP callback name (when format is json).
      outputParameters:
      - type: object
        mapping: $.
    - name: get-awards-id-format
      description: Retrieve a single award
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: national-science-foundation.get-awards-id-format
      with:
        id: tools.id
        format: tools.format
      inputParameters:
      - name: id
        type: string
